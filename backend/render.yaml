services:
  - type: web
    name: bharatpath-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: AGMARKNET_API_KEY
        sync: false